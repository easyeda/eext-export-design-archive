<!doctype html>
<html lang="zh-Hans">
	<head>
		<title>获取器件清单</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="/iframe/js/xlsx.full.min.js"></script>
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 20px;
			}
			label {
				display: inline-block;
				width: 120px;
				text-align: right;
				margin-right: 10px;
			}
			input[type='text'] {
				padding: 6px;
				width: 300px;
				font-size: 14px;
			}
			#exportButton {
				margin-top: 10px;
				padding: 8px 16px;
				font-size: 14px;
				background-color: #007bff;
				color: white;
				border: none;
				cursor: pointer;
			}
			#exportButton:hover {
				background-color: #0056b3;
			}
			#loading {
				color: #007bff;
				font-weight: bold;
				margin-top: 10px;
				display: none;
			}
			#messageBar {
				margin-left: 10px;
				color: #d9534f;
			}
		</style>
	</head>
	<body>
		<div>
			<label for="libUuidInput">库 UUID：</label>
			<input type="text" id="libUuidInput" placeholder="请输入库的 UUID（例如：personal-xxx 或 project-xxx）" />
		</div>
		<br />
		<button id="exportButton">导出器件清单</button>
		<span id="messageBar">请填写库 UUID 并点击导出</span>
		<div id="loading">正在加载器件数据，请稍候...</div>
	</body>
	<script>
		let DeviceList = [];

		document.addEventListener('DOMContentLoaded', function () {
			const exportButton = document.getElementById('exportButton');
			const libUuidInput = document.getElementById('libUuidInput');
			const messageBar = document.getElementById('messageBar');
			const loadingEl = document.getElementById('loading');

			exportButton.addEventListener('click', async () => {
				const libUuid = libUuidInput.value.trim();
				if (!libUuid) {
					messageBar.textContent = '请先输入库的 UUID';
					return;
				}

				// 显示加载状态
				loadingEl.style.display = 'block';
				messageBar.textContent = '';
				DeviceList = [];
				let page = 1;
				const pageSize = 300;

				try {
					while (true) {
						const url = `https://pro.lceda.cn/api/v2/devices?path=${encodeURIComponent(libUuid)}&uid=${encodeURIComponent(libUuid)}&page=${page}&pageSize=${pageSize}`;
						const res = await fetch(url);

						if (!res.ok) {
							throw new Error(`HTTP 错误！状态码: ${res.status}`);
						}

						const data = await res.json();
						const currentList = data.result?.lists || [];

						DeviceList.push(...currentList);

						if (currentList.length < pageSize) {
							break; // 已到最后一页
						}
						page++;
					}

					if (DeviceList.length === 0) {
						messageBar.textContent = '该库中没有找到任何器件';
						loadingEl.style.display = 'none';
						return;
					}

					// 定义需要排除的属性字段
					const excludedAttributeKeys = new Set([
						'3D Model Title',
						'Add into BOM',
						'Convert to PCB',
						'Designator',
						'Name',
						'Manufacturer',
						'Manufacturer Part',
						'Supplier',
						'Supplier Part',
						'Value',
						'Datasheet',
						'Description',
						'3D Model',
						'3D Model Transform',
						'Comment',
						'Footprint',
						'LCSC Part Name',
						'Supplier Footprint',
						'Symbol',
					]);

					// 收集额外的自定义属性名
					const extraAttributeSet = new Set();
					for (const item of DeviceList) {
						const attrs = item.attributes || {};
						for (const key in attrs) {
							if (attrs.hasOwnProperty(key) && !excludedAttributeKeys.has(key)) {
								extraAttributeSet.add(key);
							}
						}
					}
					const extraAttributeNames = Array.from(extraAttributeSet).sort();

					// 表头顺序
					const baseHeaders = [
						'Device',
						'Symbol',
						'Footprint',
						'3D Model',
						'Primary Category',
						'Secondary Category',
						'Add into BOM',
						'Convert to PCB',
						'Designator',
						'Name',
						'Manufacturer',
						'Manufacturer Part',
						'Supplier',
						'Supplier Part',
						'Part Number',
						'Value',
						'Datasheet',
						'Description',
					];

					const allHeaders = [...baseHeaders, ...extraAttributeNames];

					// 构建每行数据
					const getNested = (obj, path, fallback = '') => {
						return path.split('.').reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : fallback), obj);
					};

					const rows = DeviceList.map((item) => {
						const attrs = item.attributes || {};
						const supplierPart = attrs['Supplier Part'] || '';

						const baseValues = [
							getNested(item, 'display_title'),
							getNested(item, 'symbol.display_title'),
							getNested(item, 'footprint.display_title'),
							attrs['3D Model Title'] || '',
							getNested(item, 'tags.parent_tag.name'),
							getNested(item, 'tags.child_tag.name'),
							attrs['Add into BOM'] || '',
							attrs['Convert to PCB'] || '',
							attrs['Designator'] || '',
							attrs['Name'] || '',
							attrs['Manufacturer'] || '',
							attrs['Manufacturer Part'] || '',
							attrs['Supplier'] || '',
							supplierPart,
							supplierPart, // Part Number 复用 Supplier Part
							attrs['Value'] || '',
							attrs['Datasheet'] || '',
							attrs['Description'] || '',
						];

						const extraValues = extraAttributeNames.map((key) => (attrs[key] !== undefined ? String(attrs[key]) : ''));

						return [...baseValues, ...extraValues];
					});

					// 生成 Excel 文件
					const worksheetData = [allHeaders, ...rows];
					const ws = XLSX.utils.aoa_to_sheet(worksheetData);
					const wb = XLSX.utils.book_new();
					XLSX.utils.book_append_sheet(wb, ws, 'DeviceList');

					const fileName = `DeviceList_${new Date().toISOString().slice(0, 10)}.xlsx`;
					XLSX.writeFile(wb, fileName);

					messageBar.textContent = `✅ 成功导出 ${DeviceList.length} 个器件，包含 ${extraAttributeNames.length} 个自定义属性`;
				} catch (error) {
					console.error('导出失败:', error);
					messageBar.textContent = `❌ 导出失败：${error.message}`;
				} finally {
					loadingEl.style.display = 'none';
				}
			});
		});
	</script>
</html>
