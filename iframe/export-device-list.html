<!doctype html>
<html lang="zh-Hans">
	<head>
		<title>获取器件清单</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="/iframe/js/xlsx.full.min.js"></script>
		<style>
			#loading {
				display: none;
				color: #007bff;
				font-weight: bold;
				margin-top: 10px;
			}
		</style>
	</head>
	<body>
		<table>
			<tbody>
				<tr>
					<td align="right"><span>导出库所属：</span></td>
					<td>
						<select id="librarySelect" style="max-width: 160px">
							<option value="">---</option>
						</select>
					</td>
				</tr>
			</tbody>
		</table>
		<br />
		<input id="exportButton" value="导出" type="button" />
		<span id="messageBar">请设置导出参数</span>
		<div id="loading">正在加载器件数据，请稍候...</div>
	</body>
	<script>
		document.addEventListener('DOMContentLoaded', async function () {
			try {
				const OtherLibraries = await eda.lib_LibrariesList.getAllLibrariesList();
				const StarLibrary = await eda.lib_LibrariesList.getFavoriteLibraryUuid();
				const PersonLibrary = await eda.lib_LibrariesList.getPersonalLibraryUuid();
				const ProjectLibrary = await eda.lib_LibrariesList.getProjectLibraryUuid();
				const SystemLibrary = await eda.lib_LibrariesList.getSystemLibraryUuid();

				const specialLibraries = [
					{ uuid: SystemLibrary, name: '系统' },
					{ uuid: PersonLibrary, name: '个人' },
					{ uuid: ProjectLibrary, name: '工程' },
					{ uuid: StarLibrary, name: '收藏' },
				];

				const specialUuids = new Set(specialLibraries.map((lib) => lib.uuid));
				const filteredOtherLibraries = OtherLibraries.filter((lib) => !specialUuids.has(lib.uuid));
				const allLibraries = [...specialLibraries, ...filteredOtherLibraries];

				const select = document.getElementById('librarySelect');
				select.innerHTML =
					'<option value="">---</option>' + allLibraries.map((lib) => `<option value="${lib.uuid}">${lib.name}</option>`).join('');

				document.getElementById('exportButton').addEventListener('click', async () => {
					const libUuid = select.value;
					if (!libUuid) {
						document.getElementById('messageBar').textContent = '请先选择一个库';
						return;
					}

					const loadingEl = document.getElementById('loading');
					const messageBar = document.getElementById('messageBar');
					loadingEl.style.display = 'block';
					messageBar.textContent = '';

					try {
						const excludedAttributeKeys = new Set([
							'3D Model Title',
							'Add into BOM',
							'Convert to PCB',
							'Designator',
							'Name',
							'Manufacturer',
							'Manufacturer Part',
							'Supplier',
							'Supplier Part',
							'Value',
							'Datasheet',
							'Description',
							'3D Model',
							'3D Model Transform',
							'Comment',
							'Footprint',
							'LCSC Part Name',
							'Supplier Footprint',
							'Symbol',
						]);
						const currentUrl = window.location.origin;
						console.log(currentUrl);
						// 第一次遍历：收集所有自定义属性名（不显示进度）
						let page = 1;
						const pageSize = 300;
						let allExtraAttrs = new Set();
						console.log(`${currentUrl}/api/v2/devices?path=${libUuid}&uid=${libUuid}&page=${page}&pageSize=${pageSize}`);
						while (true) {
							const res = await fetch(`${currentUrl}/api/v2/devices?path=${libUuid}&uid=${libUuid}&page=${page}&pageSize=${pageSize}`);
							const data = await res.json();
							const currentList = data.result?.lists || [];
							if (currentList.length === 0) break;

							for (const item of currentList) {
								const attrs = item.attributes || {};
								for (const key in attrs) {
									if (attrs.hasOwnProperty(key) && !excludedAttributeKeys.has(key)) {
										allExtraAttrs.add(key);
									}
								}
							}

							if (currentList.length < pageSize) break;
							page++;
						}

						const extraAttributeNames = Array.from(allExtraAttrs).sort();
						const baseHeaders = [
							'Device',
							'Symbol',
							'Footprint',
							'3D Model',
							'Primary Category',
							'Secondary Category',
							'Add into BOM',
							'Convert to PCB',
							'Designator',
							'Name',
							'Manufacturer',
							'Manufacturer Part',
							'Supplier',
							'Supplier Part',
							'Part Number',
							'Value',
							'Datasheet',
							'Description',
						];
						const allHeaders = [...baseHeaders, ...extraAttributeNames];
						const baseLen = baseHeaders.length;

						// 第二次遍历：拉取数据并分块导出，显示进度
						page = 1;
						let buffer = [];
						const chunkSize = 5000;
						let fileCount = 0;
						let totalCount = 0;
						let loadedCount = 0; // ← 新增：已加载数量

						while (true) {
							const res = await fetch(`${currentUrl}/api/v2/devices?path=${libUuid}&uid=${libUuid}&page=${page}&pageSize=${pageSize}`);

							const data = await res.json();
							const currentList = data.result?.lists || [];
							if (currentList.length === 0) break;

							buffer.push(...currentList);
							totalCount += currentList.length;
							loadedCount += currentList.length; // ← 累加
							// 更新进度提示
							messageBar.textContent = `已加载 ${loadedCount} 个器件...`;

							// 满 5000 就导出
							while (buffer.length >= chunkSize) {
								const chunk = buffer.splice(0, chunkSize);
								await exportChunk(chunk, allHeaders, baseLen, ++fileCount);
							}

							if (currentList.length < pageSize) break;
							page++;
						}

						// 导出剩余
						if (buffer.length > 0) {
							await exportChunk(buffer, allHeaders, baseLen, ++fileCount);
						}

						if (totalCount === 0) {
							messageBar.textContent = '该库中没有器件';
						} else {
							messageBar.textContent = `成功导出 ${totalCount} 个器件，分为 ${fileCount} 个文件，含 ${extraAttributeNames.length} 个自定义属性`;
						}
					} catch (error) {
						console.error('导出失败:', error);
						messageBar.textContent = '导出失败，请查看控制台';
					} finally {
						loadingEl.style.display = 'none';
					}
				});

				async function exportChunk(chunk, headers, baseLen, partIndex) {
					const rows = chunk.map((item) => {
						const attrs = item.attributes || {};
						const getNested = (obj, path, fallback = '') => {
							return path.split('.').reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : fallback), obj);
						};

						const supplierPart = getNested(attrs, 'Supplier Part');

						const baseValues = [
							getNested(item, 'display_title'),
							getNested(item, 'symbol.display_title'),
							getNested(item, 'footprint.display_title'),
							getNested(attrs, '3D Model Title'),
							getNested(item, 'tags.parent_tag.name'),
							getNested(item, 'tags.child_tag.name'),
							getNested(attrs, 'Add into BOM'),
							getNested(attrs, 'Convert to PCB'),
							getNested(attrs, 'Designator'),
							getNested(attrs, 'Name'),
							getNested(attrs, 'Manufacturer'),
							getNested(attrs, 'Manufacturer Part'),
							getNested(attrs, 'Supplier'),
							supplierPart,
							supplierPart,
							getNested(attrs, 'Value'),
							getNested(attrs, 'Datasheet'),
							getNested(attrs, 'Description'),
						];

						const extraAttributeNames = headers.slice(baseLen);
						const extraValues = extraAttributeNames.map((key) => (attrs[key] !== undefined ? String(attrs[key]) : ''));

						return [...baseValues, ...extraValues];
					});

					const worksheetData = [headers, ...rows];
					const ws = XLSX.utils.aoa_to_sheet(worksheetData);
					const wb = XLSX.utils.book_new();
					XLSX.utils.book_append_sheet(wb, ws, 'DeviceList');

					const fileName = `DeviceList_${new Date().toISOString().slice(0, 10)}_part${partIndex}.xlsx`;
					XLSX.writeFile(wb, fileName);
				}
			} catch (err) {
				console.error('初始化失败:', err);
				document.getElementById('messageBar').textContent = '初始化失败，请查看控制台';
			}
		});
	</script>
</html>
