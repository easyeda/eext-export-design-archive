<!doctype html>
<html lang="zh-Hans">
	<head>
		<title></title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=footprint-width, initial-scale=1.0" />
		<style>
			@media (prefers-color-scheme: dark) {
				body {
					color: white;
				}
			}
		</style>
	</head>
	<body>
		<p id="browserTip" style="font-size: 11px"></p>
		<p id="formatTip" style="font-size: 11px"></p>
		<table>
			<tbody>
				<tr>
					<td align="right"><span id="libraryLabel" style="font-size: 14px"></span></td>
					<td>
						<select id="librarySelect" style="max-width: 160px">
							<option value="">---</option>
						</select>
					</td>
				</tr>
				<tr>
					<td align="right"><span id="itemsPerPageLabel" style="font-size: 14px"></span></td>
					<td><input type="number" style="width: 50px" value="2000" id="itemsOfPage" min="1" max="2000" /></td>
				</tr>
				<tr>
					<td align="right"><span style="font-size: 14px" id="exportAllSpan"></span></td>
					<td><input type="checkbox" value="yes" id="exportAll" /></td>
				</tr>
				<tr>
					<td align="right"><span id="startPageLabel" style="font-size: 14px"></span></td>
					<td><input type="number" style="width: 50px" value="1" id="page" min="1" /></td>
				</tr>
			</tbody>
		</table>
		<br />
		<input id="exportButton" value="" type="button" />&nbsp;
		<span id="messageBar" style="font-size: 11px"></span>
		<script type="text/javascript">
			var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
			function t(tag, ...args) {
				if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag, undefined, undefined, ...args);
				return tag;
			}

			function applyI18n() {
				var els = document.querySelectorAll('[data-i18n]');
				for (var i = 0; i < els.length; i++) {
					els[i].textContent = t(els[i].getAttribute('data-i18n'));
				}
				var phEls = document.querySelectorAll('[data-i18n-placeholder]');
				for (var j = 0; j < phEls.length; j++) {
					phEls[j].placeholder = t(phEls[j].getAttribute('data-i18n-placeholder'));
				}
				var titleEls = document.querySelectorAll('[data-i18n-title]');
				for (var k = 0; k < titleEls.length; k++) {
					titleEls[k].title = t(titleEls[k].getAttribute('data-i18n-title'));
				}
			}

			document.title = t('Export Footprint Archive');
			document.getElementById('browserTip').textContent = t('If using in browser, allow automatic downloads after download starts.');
			document.getElementById('formatTip').innerHTML = t('Footprint export format info');
			document.getElementById('libraryLabel').textContent = t('Export library:');
			document.getElementById('itemsPerPageLabel').textContent = t('Items per export:');
			document.getElementById('exportAllSpan').textContent = t('Export all footprints:');
			document.getElementById('startPageLabel').textContent = t('Start from page:');
			document.getElementById('exportButton').value = t('Export');
			document.getElementById('messageBar').textContent = t('Please set export parameters');

			document.getElementById('exportAll').onclick = function () {
				if (document.getElementById('exportAll').checked) {
					document.getElementById('page').disabled = true;
				} else {
					document.getElementById('page').disabled = false;
				}
			};

			document.getElementById('exportAllSpan').onclick = function () {
				document.getElementById('exportAll').checked = !document.getElementById('exportAll').checked;
				if (document.getElementById('exportAll').checked) {
					document.getElementById('page').disabled = true;
				} else {
					document.getElementById('page').disabled = false;
				}
			};

			document.getElementById('librarySelect').onclick = async function () {
				if (document.getElementById('librarySelect').options.length <= 1) {
					const libraries = [];
					let personalLibraryUuid = await eda.lib_LibrariesList.getPersonalLibraryUuid();
					if (personalLibraryUuid && personalLibraryUuid.uuid) {
						personalLibraryUuid = personalLibraryUuid.uuid;
					}
					personalLibraryUuid && libraries.push({ name: t('Personal'), uuid: personalLibraryUuid });
					const projectLibraryUuid = await eda.lib_LibrariesList.getProjectLibraryUuid();
					projectLibraryUuid && libraries.push({ name: t('Project'), uuid: projectLibraryUuid });
					const favoriteLibraryUuid = await eda.lib_LibrariesList.getFavoriteLibraryUuid();
					favoriteLibraryUuid && libraries.push({ name: t('Favorites'), uuid: favoriteLibraryUuid });
					const librariesFetched = await eda.lib_LibrariesList.getAllLibrariesList();
					libraries.push(...librariesFetched);
					for (const library of libraries) {
						const optionElement = document.createElement('option');
						optionElement.innerHTML = library.name;
						optionElement.value = library.uuid;
						document.getElementById('librarySelect').appendChild(optionElement);
					}
				}
			};

			document.getElementById('exportButton').onclick = async function () {
				document.getElementById('exportButton').disabled = true;
				document.getElementById('messageBar').innerHTML = t('Start exporting');

				if (eda.sys_Environment.isClient() && eda.sys_Environment.isOfflineMode()) {
					eda.sys_PanelControl.openBottomPanel('library');
				}

				const libraryUuid = document.getElementById('librarySelect').value;
				const itemsOfPage = Number(document.getElementById('itemsOfPage').value);
				let page = Number(document.getElementById('page').value);
				const exportAll = document.getElementById('exportAll').checked;
				if (!libraryUuid || !itemsOfPage || (page < 1 && !exportAll)) {
					document.getElementById('messageBar').innerHTML = t('No library selected');
					document.getElementById('exportButton').disabled = false;
					return;
				}

				// 版本检测：确定封装文件格式与扩展名
				const editorVersion = await eda.sys_Environment.getEditorCurrentVersion();
				const versionParts = editorVersion.split('.').map(Number);
				const isVersion3OrAbove = versionParts[0] >= 3;
				const fileFormat = isVersion3OrAbove ? '.elibz2' : '.elibz';
				const fileExtension = isVersion3OrAbove ? '.elibz2' : '.elibz';

				if (exportAll) {
					page = 0;
					while (true) {
						page++;
						document.getElementById('messageBar').innerHTML = t('Fetching footprint list');
						const footprints = await eda.lib_Footprint.search('', libraryUuid, undefined, itemsOfPage, page);
						if (!footprints.length) {
							if (page === 0) {
								document.getElementById('messageBar').innerHTML = t('No footprints to export');
							} else {
								document.getElementById('messageBar').innerHTML = t('Export completed');
							}
							document.getElementById('exportButton').disabled = false;
							return;
						}
						// [单页封装导出开始]
						// const zip = new JSZip();
						// for (const [footprintIndex, footprint] of footprints.entries()) {
						// 	document.getElementById('messageBar').innerHTML =
						// 		'正在导出第 ' + page.toString() + ' 页 (' + (footprintIndex + 1).toString() + '/' + footprints.length.toString() + ')';
						// 	const footprintFile = await eda.sys_FileManager.getFootprintFileByFootprintUuid(Footprint.uuid, libraryUuid);
						// 	zip.file(
						// 		'ProLib_' +
						// 			libraryUuid +
						// 			'_' +
						// 			itemsOfPage.toString() +
						// 			'_' +
						// 			page.toString() +
						// 			'_' +
						// 			(footprintIndex + 1).toString() +
						// 			'.elibz',
						// 		footprintFile,
						// 	);
						// }
						// document.getElementById('messageBar').innerHTML = '正在下载第 ' + page.toString() + ' 页的所有封装';
						// const pageNow = page; // 为了解决异步操作时 page 已自增的问题
						// zip.generateAsync({ type: 'blob' }).then(async (blob) => {
						// 	await eda.sys_FileSystem.saveFile(
						// 		new File([blob], 'footprint_' + libraryUuid + '_' + itemsOfPage.toString() + '_' + pageNow.toString() + '.zip'),
						// 	);
						// });
						// [单页封装导出结束]
						// [单页封装导出开始]
						document.getElementById('messageBar').innerHTML = t('Exporting page ${1}', page);
						const footprintUuids = [];
						for (const footprint of footprints) {
							footprintUuids.push(footprint.uuid);
						}
						const footprintFile = await eda.sys_FileManager.getFootprintFileByFootprintUuid(footprintUuids, libraryUuid, fileFormat);
						await eda.sys_FileSystem.saveFile(footprintFile, footprintFile.name.split('.')[0] + '_' + page.toString() + fileExtension);
						// [单页封装导出结束]
						if (footprints.length < itemsOfPage) {
							// 最后一页结束循环
							document.getElementById('messageBar').innerHTML = t('Export completed');
							document.getElementById('exportButton').disabled = false;
							return;
						}
					}
				} else {
					if (page < 1 || itemsOfPage < 1) {
						document.getElementById('messageBar').innerHTML = t('Footprint count or page number cannot be zero');
						document.getElementById('exportButton').disabled = false;
						return;
					}
					document.getElementById('messageBar').innerHTML = t('Fetching footprint list');
					const footprints = await eda.lib_Footprint.search('', libraryUuid, undefined, itemsOfPage, page);
					if (!footprints.length) {
						document.getElementById('messageBar').innerHTML = t('No footprints to export');
						document.getElementById('exportButton').disabled = false;
						return;
					}
					// [单页封装导出开始]
					// const zip = new JSZip();
					// for (const [footprintIndex, footprint] of footprints.entries()) {
					// 	document.getElementById('messageBar').innerHTML =
					// 		'正在导出第 ' + page.toString() + ' 页 (' + (footprintIndex + 1).toString() + '/' + footprints.length.toString() + ')';
					// 	const footprintFile = await eda.sys_FileManager.getFootprintFileByFootprintUuid(footprint.uuid, libraryUuid);
					// 	zip.file(
					// 		'ProLib_' +
					// 			libraryUuid +
					// 			'_' +
					// 			itemsOfPage.toString() +
					// 			'_' +
					// 			page.toString() +
					// 			'_' +
					// 			(footprintIndex + 1).toString() +
					// 			'.elibz',
					// 		footprintFile,
					// 	);
					// }
					// document.getElementById('messageBar').innerHTML = '正在下载第 ' + page.toString() + ' 页的所有封装';
					// zip.generateAsync({ type: 'blob' }).then(async (blob) => {
					// 	await eda.sys_FileSystem.saveFile(
					// 		new File([blob], 'footprint_' + libraryUuid + '_' + itemsOfPage.toString() + '_' + page.toString() + '.zip'),
					// 	);
					// });
					// [单页封装导出结束]
					// [单页封装导出开始]
					document.getElementById('messageBar').innerHTML = t('Exporting page ${1}', page);
					const footprintUuids = [];
					for (const footprint of footprints) {
						footprintUuids.push(footprint.uuid);
					}
					const footprintFile = await eda.sys_FileManager.getFootprintFileByFootprintUuid(footprintUuids, libraryUuid, fileFormat);
					let footprintFileName = footprintFile?.name || 'ProLib' + fileExtension;
					await eda.sys_FileSystem.saveFile(footprintFile, footprintFileName.split('.')[0] + '_' + page.toString() + fileExtension);
					// [单页封装导出结束]
				}
				document.getElementById('messageBar').innerHTML = t('Export completed');
				document.getElementById('exportButton').disabled = false;
			};
		</script>
	</body>
</html>
