<!doctype html>
<html lang="zh-Hans">
	<head>
		<title></title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			@media (prefers-color-scheme: dark) {
				body {
					color: white;
				}
			}
		</style>
	</head>
	<body>
		<p id="importTip" style="font-size: 11px"></p>
		<textarea
			id="lcscId"
			rows="5"
			placeholder=""
			autocapitalize="characters"
			autocomplete="off"
			minlength="2"
			spellcheck="false"
			style="resize: none; width: 280px"
			required="true"
		></textarea>
		<br />
		<input id="exportButton" value="" type="button" />&nbsp;
		<span id="messageBar" style="font-size: 11px"></span>
		<script type="text/javascript">
			var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
			function t(tag, ...args) {
				if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag, undefined, undefined, ...args);
				return tag;
			}

			document.title = t('Export Device Archive');
			document.getElementById('importTip').textContent = t('Exported files can be imported via Editor > File > Import > EasyEDA Pro.');
			document.getElementById('lcscId').placeholder = t('Enter LCSC part numbers, separated by commas or newlines. Export will be from EasyEDA system library.');
			document.getElementById('exportButton').value = t('Export');
			document.getElementById('messageBar').textContent = t('Please set export parameters');

			document.getElementById('exportButton').onclick = async function () {
				document.getElementById('exportButton').disabled = true;
				document.getElementById('lcscId').readonly = true;
				document.getElementById('messageBar').innerHTML = t('Start exporting');

				// 获取编辑器版本并确定文件格式
				const editorVersion = await eda.sys_Environment.getEditorCurrentVersion();
				console.log('Editor version:', editorVersion);

				// 版本比较：3.0.0.0以上使用elibz2，否则使用elibz
				const versionParts = editorVersion.split('.').map(Number);
				const isVersion3OrAbove = versionParts[0] >= 3;
				const fileFormat = isVersion3OrAbove ? '.elibz2' : '.elibz';
				const fileExtension = isVersion3OrAbove ? '.elibz2' : '.elibz';

				const systemLibraryUuid = await eda.lib_LibrariesList.getSystemLibraryUuid();
				const lcscIdString = await document.getElementById('lcscId').value;
				if (!systemLibraryUuid) {
					document.getElementById('messageBar').innerHTML = t('No library selected');
					document.getElementById('exportButton').disabled = false;
					document.getElementById('lcscId').readonly = false;
					return;
				}

				/**
				 * 解析多行 C 编号并去重
				 *
				 * @param str - 多行 C 编号
				 * @returns C 编号数组
				 */
				function multiLineStrToArray(str) {
					// 按行拆分字符串
					const strList = str.split(/[\r\n]+/);
					const returnList = [];
					for (const strLine of strList) {
						const str = strLine.trim();
						if (str.match(/^C[1-9]{1}[0-9]*$/g)) {
							returnList.push(str);
						}
					}
					// 去重
					return Array.from(new Set(returnList));
				}

				const lcscIdList = multiLineStrToArray(lcscIdString.replace(/[,，]+/g, '\n'));
				console.log('[INFO] lcscIdList: ', lcscIdList);
				document.getElementById('messageBar').innerHTML = t('Querying devices (${1}/${2})', 0, lcscIdList.length);
				const deviceUuids = [];
				const unmatchedLcscIdList = [];
				for (const lcscId of lcscIdList) {
					document.getElementById('messageBar').innerHTML =
						t('Querying devices (${1}/${2})', deviceUuids.length + unmatchedLcscIdList.length + 1, lcscIdList.length);
					const searchResult = await eda.lib_Device.search(lcscId, systemLibraryUuid, undefined, 2, 15, 1);
					let isSearched = false;
					for (const resultLine of searchResult) {
						if (resultLine.supplierId === lcscId) {
							deviceUuids.push(resultLine.uuid);
							isSearched = true;
							break;
						}
					}
					if (!isSearched) {
						unmatchedLcscIdList.push(lcscId);
					}
				}
				console.log('[INFO] deviceUuids: ', deviceUuids);

				if (deviceUuids.length >= 1) {
					document.getElementById('messageBar').innerHTML = t('Exporting ${1} devices', deviceUuids.length);
					await eda.sys_FileSystem.saveFile(
						await eda.sys_FileManager.getDeviceFileByDeviceUuid(deviceUuids, systemLibraryUuid, fileFormat),
					);
					if (unmatchedLcscIdList.length === 0) {
						document.getElementById('messageBar').innerHTML = t('Export completed');
						eda.sys_ToastMessage.showMessage(t('Export completed, successfully exported ${1} devices', deviceUuids.length), 3);
					} else {
						document.getElementById('messageBar').innerHTML = t('Export completed, but with errors');
						eda.sys_ToastMessage.showMessage(t('Export completed, but ${1} devices unmatched', unmatchedLcscIdList.length), 1);
						eda.sys_MessageBox.showInformationMessage(
							t('Export completed, exported ${1} devices, ${2} part numbers not matched:\n${3}', deviceUuids.length, unmatchedLcscIdList.length, unmatchedLcscIdList.join(', ')),
							t('Export result'),
						);
					}
				} else {
					document.getElementById('messageBar').innerHTML = t('Export failed');
					eda.sys_ToastMessage.showMessage(t('Export failed, no devices matched'), 0);
					eda.sys_MessageBox.showInformationMessage(t('Export failed, no devices matched'), t('Export result'));
				}

				document.getElementById('exportButton').disabled = false;
				document.getElementById('lcscId').readonly = false;
			};
		</script>
	</body>
</html>
